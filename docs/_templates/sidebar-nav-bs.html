{# Override: use Sphinx's built-in toctree to show all pages + subsections #}
<nav class="bd-docs-nav bd-links"
     aria-label="{{ _('Section Navigation') }}">
  <p class="bd-links__title" role="heading" aria-level="1">{{ _("Section Navigation") }}</p>
  <div class="bd-toc-item navbar-nav">
    {{ toctree(maxdepth=theme_navigation_depth | int, collapse=theme_collapse_navigation | tobool, includehidden=True, titles_only=False) }}
  </div>
</nav>
